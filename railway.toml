[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/Dockerfile"
watchPatterns = [
  "api/**",
  "deploy/railway/**",
  "playlists/**",
  "scripts/**",
  "site/**",
  "videos/**",
  "railway.toml"
]

[deploy]
healthcheckPath = "/api/health/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
drainingSeconds = 30

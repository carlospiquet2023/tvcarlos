openapi: 3.1.0
info:
  title: TV Carlos API
  version: 3.0.0
  description: API pública e administrativa da Web TV. Escritas exigem cookie de sessão e token CSRF.
servers:
  - url: http://localhost:8082
    description: Docker local
tags:
  - { name: Health }
  - { name: Auth }
  - { name: Content }
  - { name: Media }
security: []
paths:
  /api/health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      responses:
        '200': { description: Processo ativo, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }
  /api/health/ready:
    get:
      tags: [Health]
      operationId: getReadiness
      responses:
        '200': { description: API e banco prontos, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/stream/status:
    get:
      tags: [Health]
      operationId: getStreamStatus
      responses:
        '200':
          description: Existência atual das playlists HLS, sem expor chaves RTMP.
          content:
            application/json:
              schema:
                type: object
                required: [live, loop]
                properties: { live: { type: boolean }, loop: { type: boolean } }
  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LoginInput' } } }
      responses:
        '200': { description: Sessão criada; envia cookies tv_session e tv_csrf., content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/session:
    get:
      tags: [Auth]
      operationId: getSession
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Sessão atual, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '204': { description: Sessão revogada }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' } }
  /api/auth/credentials:
    put:
      tags: [Auth]
      operationId: changeCredentials
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CredentialsInput' } } }
      responses: { '204': { description: Credenciais alteradas e sessões revogadas }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' } }
  /api/news:
    get:
      tags: [Content]
      operationId: listNews
      responses: { '200': { description: Notícias ordenadas, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/News' } } } } } }
    post:
      tags: [Content]
      operationId: createNews
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/News' }
      responses: { '201': { description: Criada, content: { application/json: { schema: { $ref: '#/components/schemas/News' } } } }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthorized' } }
  /api/news/order:
    put:
      tags: [Content]
      operationId: reorderNews
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Order' }
      responses: { '204': { description: Reordenadas }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/news/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Content]
      operationId: updateNews
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/News' }
      responses: { '200': { description: Atualizada, content: { application/json: { schema: { $ref: '#/components/schemas/News' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    delete:
      tags: [Content]
      operationId: deleteNews
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '204': { description: Removida }, '404': { $ref: '#/components/responses/NotFound' } }
  /api/grade:
    get:
      tags: [Content]
      operationId: listPrograms
      responses: { '200': { description: Grade ordenada, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Program' } } } } } }
    post:
      tags: [Content]
      operationId: createProgram
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Program' }
      responses: { '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/Program' } } } }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/grade/order:
    put:
      tags: [Content]
      operationId: reorderPrograms
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Order' }
      responses: { '204': { description: Reordenados }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/grade/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Content]
      operationId: updateProgram
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Program' }
      responses: { '200': { description: Atualizado, content: { application/json: { schema: { $ref: '#/components/schemas/Program' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    delete:
      tags: [Content]
      operationId: deleteProgram
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '204': { description: Removido }, '404': { $ref: '#/components/responses/NotFound' } }
  /api/branding:
    get:
      tags: [Content]
      operationId: getBranding
      responses: { '200': { description: Identidade pública e dados legais, content: { application/json: { schema: { $ref: '#/components/schemas/Branding' } } } } }
    put:
      tags: [Content]
      operationId: updateBranding
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/BrandingInput' } } } }
      responses: { '200': { description: Atualizada, content: { application/json: { schema: { $ref: '#/components/schemas/Branding' } } } }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/private-rooms:
    get:
      tags: [Content]
      operationId: listPrivateRooms
      security: [{ sessionCookie: [] }]
      responses: { '200': { description: Salas privadas cadastradas, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/PrivateRoom' } } } } }, '401': { $ref: '#/components/responses/Unauthorized' } }
    post:
      tags: [Content]
      operationId: createPrivateRoom
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/PrivateRoom' }
      responses: { '201': { description: Sala criada; a senha só é retornada nesta resposta, content: { application/json: { schema: { $ref: '#/components/schemas/CreatePrivateRoomResponse' } } } }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' } }
  /api/private-rooms/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Content]
      operationId: updatePrivateRoom
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/PrivateRoom' }
      responses: { '200': { description: Sala atualizada, content: { application/json: { schema: { $ref: '#/components/schemas/PrivateRoom' } } } }, '400': { $ref: '#/components/responses/ValidationError' }, '404': { $ref: '#/components/responses/NotFound' } }
    delete:
      tags: [Content]
      operationId: deletePrivateRoom
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '204': { description: Sala removida e sessões privadas associadas revogadas }, '404': { $ref: '#/components/responses/NotFound' } }
  /api/private-rooms/{id}/rotate-password:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    post:
      tags: [Content]
      operationId: rotatePrivateRoomPassword
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '200': { description: Nova senha gerada; copie antes de sair da tela, content: { application/json: { schema: { $ref: '#/components/schemas/CreatePrivateRoomResponse' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
  /api/private-room-access:
    post:
      tags: [Content]
      operationId: accessPrivateRoom
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PrivateRoomAccessInput' } } } }
      responses: { '200': { description: Acesso concedido; envia cookie HttpOnly tv_private_room_session, content: { application/json: { schema: { $ref: '#/components/schemas/PrivateRoomAccessResponse' } } } }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthorized' }, '429': { $ref: '#/components/responses/RateLimited' } }
  /api/private-room-access/{roomCode}:
    get:
      tags: [Content]
      operationId: getPrivateRoomAccess
      security: [{ privateRoomCookie: [] }]
      parameters: [{ name: roomCode, in: path, required: true, schema: { type: string, pattern: '^[a-zA-Z0-9-]{4,24}$' } }]
      responses: { '200': { description: Sala liberada para a sessão privada atual, content: { application/json: { schema: { $ref: '#/components/schemas/PrivateRoom' } } } }, '401': { $ref: '#/components/responses/Unauthorized' } }
  /api/private-room-access/logout:
    post:
      tags: [Content]
      operationId: logoutPrivateRoom
      responses: { '204': { description: Cookie privado removido } }
  /api/partners:
    get:
      tags: [Content]
      operationId: listPartners
      responses: { '200': { description: Parceiros ordenados, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Partner' } } } } } }
    post:
      tags: [Content]
      operationId: createPartner
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Partner' }
      responses: { '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/Partner' } } } }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/partners/order:
    put:
      tags: [Content]
      operationId: reorderPartners
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Order' }
      responses: { '204': { description: Reordenados }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/partners/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Content]
      operationId: updatePartner
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Partner' }
      responses: { '200': { description: Atualizado, content: { application/json: { schema: { $ref: '#/components/schemas/Partner' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    delete:
      tags: [Content]
      operationId: deletePartner
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '204': { description: Removido }, '404': { $ref: '#/components/responses/NotFound' } }
  /api/header-links:
    get:
      tags: [Content]
      operationId: listHeaderLinks
      responses: { '200': { description: Até quatro botões ordenados, content: { application/json: { schema: { type: array, maxItems: 4, items: { $ref: '#/components/schemas/HeaderLink' } } } } } }
    post:
      tags: [Content]
      operationId: createHeaderLink
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/HeaderLink' }
      responses: { '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/HeaderLink' } } } }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/header-links/order:
    put:
      tags: [Content]
      operationId: reorderHeaderLinks
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/Order' }
      responses: { '204': { description: Reordenados }, '400': { $ref: '#/components/responses/ValidationError' } }
  /api/header-links/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Content]
      operationId: updateHeaderLink
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/HeaderLink' }
      responses: { '200': { description: Atualizado, content: { application/json: { schema: { $ref: '#/components/schemas/HeaderLink' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    delete:
      tags: [Content]
      operationId: deleteHeaderLink
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses: { '204': { description: Removido }, '404': { $ref: '#/components/responses/NotFound' } }
  /api/audit:
    get:
      tags: [Content]
      operationId: listAudit
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses: { '200': { description: Eventos recentes, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AuditLog' } } } } }, '401': { $ref: '#/components/responses/Unauthorized' } }
  /api/upload/image:
    post:
      tags: [Media]
      operationId: uploadImage
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/File' }
      responses: { '201': { description: Imagem validada e armazenada, content: { application/json: { schema: { $ref: '#/components/schemas/StoredMedia' } } } }, '400': { $ref: '#/components/responses/ValidationError' }, '413': { description: Limite de 10 MB excedido } }
  /api/upload/video:
    post:
      tags: [Media]
      operationId: uploadVideo
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody: { $ref: '#/components/requestBodies/File' }
      responses: { '201': { description: Vídeo validado por assinatura e ffprobe, content: { application/json: { schema: { $ref: '#/components/schemas/StoredMedia' } } } }, '400': { $ref: '#/components/responses/ValidationError' }, '413': { description: Limite de 500 MB excedido } }
components:
  securitySchemes:
    sessionCookie: { type: apiKey, in: cookie, name: tv_session }
    privateRoomCookie: { type: apiKey, in: cookie, name: tv_private_room_session }
    csrfHeader: { type: apiKey, in: header, name: X-CSRF-Token }
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
  requestBodies:
    News: { required: true, content: { application/json: { schema: { type: object, additionalProperties: false, required: [text], properties: { text: { type: string, minLength: 1, maxLength: 500 } } } } } }
    Program: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProgramInput' } } } }
    PrivateRoom: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PrivateRoomInput' } } } }
    Partner: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PartnerInput' } } } }
    HeaderLink: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/HeaderLinkInput' } } } }
    Order: { required: true, content: { application/json: { schema: { type: object, additionalProperties: false, required: [ids], properties: { ids: { type: array, minItems: 1, maxItems: 500, uniqueItems: true, items: { type: string, format: uuid } } } } } } }
    File: { required: true, content: { multipart/form-data: { schema: { type: object, required: [file], properties: { file: { type: string, format: binary } } } } } }
  responses:
    ValidationError: { description: Entrada rejeitada, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Unauthorized: { description: Sessão ausente ou expirada, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Forbidden: { description: Origem ou CSRF rejeitado, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    NotFound: { description: Recurso inexistente, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    RateLimited: { description: Limite de requisições excedido, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    InternalError: { description: Falha interna com request ID nos logs, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  schemas:
    Health: { type: object, additionalProperties: false, properties: { status: { type: string } }, required: [status] }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties: { code: { type: string }, message: { type: string } }
    LoginInput: { type: object, additionalProperties: false, required: [username, password], properties: { username: { type: string, minLength: 3, maxLength: 80 }, password: { type: string, minLength: 1, maxLength: 128, format: password } } }
    CredentialsInput: { type: object, additionalProperties: false, required: [currentPassword, newUsername, newPassword], properties: { currentPassword: { type: string, format: password }, newUsername: { type: string, minLength: 3, maxLength: 80 }, newPassword: { type: string, minLength: 14, maxLength: 128, format: password } } }
    Session: { type: object, required: [user, expiresAt], properties: { user: { type: object, required: [id, username], properties: { id: { type: string, format: uuid }, username: { type: string } } }, expiresAt: { type: string, format: date-time } } }
    OrderedEntity: { type: object, required: [id, position, createdAt], properties: { id: { type: string, format: uuid }, position: { type: integer, minimum: 0 }, createdAt: { type: string, format: date-time } } }
    News: { allOf: [{ $ref: '#/components/schemas/OrderedEntity' }, { type: object, required: [text], properties: { text: { type: string } } }] }
    ProgramInput: { type: object, additionalProperties: false, required: [title, description, video], properties: { title: { type: string, minLength: 1, maxLength: 160 }, description: { type: string, maxLength: 500 }, video: { type: string, maxLength: 2048, description: "Nome de upload, URL HTTPS ou URL válida do YouTube." } } }
    Program: { allOf: [{ $ref: '#/components/schemas/OrderedEntity' }, { $ref: '#/components/schemas/ProgramInput' }] }
    PrivateRoomInput:
      type: object
      additionalProperties: false
      required: [title, description, sourceType, sourceUrl, isActive, expiresAt]
      properties:
        title: { type: string, minLength: 1, maxLength: 160 }
        description: { type: string, maxLength: 500 }
        sourceType: { type: string, enum: [live, youtube, video, external], description: "live usa o HLS principal; youtube aceita URL do YouTube; video aceita upload/HTTPS; external aceita URL HTTPS." }
        sourceUrl: { type: string, maxLength: 2048, description: "Obrigatória exceto quando sourceType for live." }
        isActive: { type: boolean }
        expiresAt: { type: [string, 'null'], format: date-time }
    PrivateRoom:
      allOf:
        - type: object
          required: [id, roomCode, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            roomCode: { type: string, pattern: '^[A-Z0-9-]{4,24}$' }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
        - $ref: '#/components/schemas/PrivateRoomInput'
    CreatePrivateRoomResponse:
      type: object
      additionalProperties: false
      required: [room, accessPassword]
      properties:
        room: { $ref: '#/components/schemas/PrivateRoom' }
        accessPassword: { type: string, format: password, description: "Senha exibida apenas na criação/rotação." }
    PrivateRoomAccessInput:
      type: object
      additionalProperties: false
      required: [roomCode, password]
      properties:
        roomCode: { type: string, pattern: '^[a-zA-Z0-9-]{4,24}$' }
        password: { type: string, minLength: 1, maxLength: 128, format: password }
    PrivateRoomAccessResponse:
      type: object
      additionalProperties: false
      required: [room, url]
      properties:
        room: { $ref: '#/components/schemas/PrivateRoom' }
        url: { type: string, description: "Página protegida da sala." }
    PartnerInput: { type: object, additionalProperties: false, required: [name, logoUrl, destinationUrl], properties: { name: { type: string, maxLength: 160 }, logoUrl: { type: string, maxLength: 2048 }, destinationUrl: { type: string, maxLength: 2048 } } }
    Partner: { allOf: [{ $ref: '#/components/schemas/OrderedEntity' }, { $ref: '#/components/schemas/PartnerInput' }] }
    HeaderLinkInput: { type: object, additionalProperties: false, required: [name, url], properties: { name: { type: string, maxLength: 40 }, url: { type: string, maxLength: 2048 } } }
    HeaderLink: { allOf: [{ $ref: '#/components/schemas/OrderedEntity' }, { $ref: '#/components/schemas/HeaderLinkInput' }] }
    BrandingInput:
      type: object
      additionalProperties: false
      required: [companyName, tagline, watermarkText, logoText, logoUrl, scheduleTitle, tickerLabel, rssNewsUrl, partnerLabel, liveSource, liveYoutubeUrl, liveTitle, liveDescription, loopTitle, loopDescription, legalName, legalEmail, legalCnpj, legalCity, legalPhone]
      properties:
        companyName: { type: string, maxLength: 160 }
        tagline: { type: string, maxLength: 160 }
        watermarkText: { type: string, maxLength: 300 }
        logoText: { type: string, maxLength: 160 }
        logoUrl: { type: string, maxLength: 2048 }
        backgroundUrl: { type: string, maxLength: 2048, description: "Imagem de fundo do site; URL HTTPS, upload interno ou string vazia para usar o fundo padrão." }
        scheduleTitle: { type: string, maxLength: 160 }
        tickerLabel: { type: string, maxLength: 80 }
        rssNewsUrl: { type: string, maxLength: 2048, description: "URL HTTPS de feed RSS." }
        partnerLabel: { type: string, maxLength: 80 }
        liveSource: { type: string, enum: [obs, youtube], description: "Fonte do sinal principal ao vivo." }
        liveYoutubeUrl: { type: string, maxLength: 2048, description: "URL HTTPS da live do YouTube; use string vazia quando liveSource for obs." }
        liveTitle: { type: string, maxLength: 160 }
        liveDescription: { type: string, maxLength: 300 }
        loopTitle: { type: string, maxLength: 160 }
        loopDescription: { type: string, maxLength: 300 }
        legalName: { type: string, maxLength: 180 }
        legalEmail: { type: string, format: email }
        legalCnpj: { type: string, pattern: '^\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}$' }
        legalCity: { type: string, maxLength: 120 }
        legalPhone: { type: string, maxLength: 30 }
    Branding: { allOf: [{ $ref: '#/components/schemas/BrandingInput' }, { type: object, required: [updatedAt], properties: { updatedAt: { type: string, format: date-time } } }] }
    AuditLog: { type: object, required: [id, action, targetType, metadata, createdAt], properties: { id: { type: string, format: uuid }, action: { type: string }, targetType: { type: string }, targetId: { type: [string, 'null'] }, requestId: { type: [string, 'null'] }, ip: { type: [string, 'null'] }, metadata: { type: object }, createdAt: { type: string, format: date-time } } }
    StoredMedia: { type: object, required: [key, publicUrl], properties: { key: { type: string }, publicUrl: { type: string }, filename: { type: string } } }

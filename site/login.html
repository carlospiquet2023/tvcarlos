<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#eef6f5">
    <meta name="robots" content="noindex,nofollow">
    <title>Acesso administrativo · TV Carlos</title>
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/foundation.css?v=33">
    <link rel="stylesheet" href="css/login.css?v=33">
    <link rel="stylesheet" href="css/accessibility.css?v=33">
</head>
<body class="login-page">
    <main class="login-card">
        <header class="login-header">
            <div class="login-logo" aria-hidden="true"><i class="fa-solid fa-lock"></i></div>
            <h1 class="login-title">TV <span>Carlos</span></h1>
            <p class="login-subtitle">Central de Operações · Acesso restrito</p>
        </header>
        <div id="error-alert" class="error-message hidden" role="alert"><i class="fa-solid fa-circle-exclamation"></i><span id="error-text">Credenciais inválidas</span></div>
        <form id="login-form">
            <div class="login-form-group">
                <label for="username">Usuário</label>
                <div class="input-wrapper"><input type="text" id="username" class="login-input" required autocomplete="username"><i class="fa-regular fa-user" aria-hidden="true"></i></div>
            </div>
            <div class="login-form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper"><input type="password" id="password" class="login-input" required autocomplete="current-password"><i class="fa-regular fa-eye-slash" id="toggle-password" role="button" aria-label="Mostrar ou ocultar senha" tabindex="0"></i></div>
            </div>
            <button type="submit" class="btn-login" id="submit-btn"><i class="fa-solid fa-right-to-bracket"></i> Entrar no painel</button>
        </form>
        <a href="index.html" class="back-to-site"><i class="fa-solid fa-arrow-left"></i> Voltar para a TV</a>
    </main>
    <script type="module" src="login.js"></script>
    <script src="js/accessibility.js"></script>
    

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
